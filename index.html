<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단막 프랜차이즈 시뮬레이션</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #8B4513;
            --brand-dark: #5C2D0E;
            --brand-gold: #B8905B;
            --brand-gold-light: #D4B896;
            --bg-page: #FDFBF7;
            --text-main: #2A2521;
            --text-muted: #7A726A;
            --border-color: #E8E3DD;
            --radius-lg: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg-page);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 48px;
        }
        .header h1 {
            font-family: 'Noto Serif KR', serif;
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--brand-dark);
            margin-bottom: 8px;
        }
        .header p {
            font-size: 1rem;
            color: var(--text-muted);
        }
        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            max-width: 700px;
            width: 100%;
        }
        .card {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 36px 28px;
            text-align: center;
            text-decoration: none;
            color: var(--text-main);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-4px);
            border-color: var(--brand-gold-light);
            box-shadow:
                0 8px 25px rgba(184, 144, 91, 0.2),
                0 2px 8px rgba(42, 37, 33, 0.05);
        }
        .card-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            margin: 0 auto 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Noto Serif KR', serif;
            font-size: 1.4rem;
            font-weight: 900;
            color: #fff;
        }
        .card-icon.cost { background: linear-gradient(135deg, var(--brand-dark), var(--brand-primary)); }
        .card-icon.revenue { background: linear-gradient(135deg, var(--brand-gold), var(--brand-gold-light)); }
        .card h2 {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .card p {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
        }
        .footer {
            margin-top: 48px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        @media (max-width: 600px) {
            .cards { grid-template-columns: 1fr; }
            .header h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>단막 프랜차이즈</h1>
        <p>가맹 비용 및 매출 시뮬레이션</p>
    </div>

    <div class="cards">
        <a class="card" href="cost.html">
            <div class="card-icon cost">C</div>
            <h2>예상 개설비용</h2>
            <p>평수, 상권별 인테리어, 설비, 화로 등<br>총 개설비용을 시뮬레이션합니다</p>
        </a>
        <a class="card" href="revenue.html">
            <div class="card-icon revenue">R</div>
            <h2>매출 시뮬레이션</h2>
            <p>상권, 평수별 예상 월 매출과<br>순수익을 분석합니다</p>
        </a>
    </div>

    <div class="footer">2026년 기준 VAT 포함 추정</div>

</body>
</html>
